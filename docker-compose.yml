services:
  music-bot:
    build: .
    container_name: musician-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
      # Optional: place a Netscape-format YouTube cookies file at ./data/youtube-cookies.txt
      # and set YTDLP_COOKIES_PATH=/app/data/youtube-cookies.txt in .env.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  database_data:
